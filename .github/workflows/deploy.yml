name: CI/CD MLflow Iris Production

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy

      - name: Run mlflow project
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          cd MLproject
          python train.py

      - name: Get latest MLflow run_id
        run: |
          cd MLproject
          # Extract run_id from mlruns metadata directory (newest first)
          LATEST_RUN=$(find mlruns/0 -name 'meta.yaml' -exec dirname {} \; 2>/dev/null | sort -r | head -n 1)
          if [ -n "$LATEST_RUN" ]; then
            RUN_ID=$(basename "$LATEST_RUN")
            echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
            echo "Latest run_id didapat: $RUN_ID"
          else
            echo "No MLflow runs found" >&2
            exit 1
          fi

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: "file://./mlruns"
        run: |
          cd MLproject
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "iris-api"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag iris-api ${{ secrets.DOCKER_HUB_USERNAME }}/iris-api:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/iris-api:latest