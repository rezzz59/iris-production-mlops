name: CI/CD MLflow Iris Production

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy

      - name: Run mlflow project
        run: |
          cd MLproject
          python train.py

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: "sqlite:////${{ github.workspace }}/MLproject/mlruns/mlflow.db"
        run: |
          cd MLproject
          MODEL_URI=$(cat model_uri.txt)
          echo "Building Docker image from model URI: $MODEL_URI"
          mlflow models build-docker --model-uri "$MODEL_URI" --name "iris-api"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag iris-api ${{ secrets.DOCKER_HUB_USERNAME }}/iris-api:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/iris-api:latest